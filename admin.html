<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Oferta Certa</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;color:#222}
header{background:#111827;color:white;padding:22px;text-align:center}
h1{margin:0;font-size:30px}
.container{max-width:850px;margin:20px auto;padding:16px}
.card{background:white;border-radius:18px;padding:20px;box-shadow:0 4px 18px #0002;margin-bottom:18px}
label{font-weight:bold;margin-top:12px;display:block}
input,select{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;font-size:16px;margin-top:6px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button{border:0;border-radius:12px;padding:14px;font-size:16px;font-weight:bold;cursor:pointer}
.save{background:#00a650;color:white;width:100%;margin-top:16px}
.delete{background:#ef4444;color:white;padding:10px 12px;font-size:14px}
.edit{background:#3483fa;color:white;padding:10px 12px;font-size:14px}
.clear{background:#6b7280;color:white;width:100%;margin-top:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.prod{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 3px 12px #0001}
.img{height:140px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:42px}
.img img{width:100%;height:100%;object-fit:cover}
.info{padding:14px}
.price{color:#00a650;font-size:22px;font-weight:900}
.actions{display:flex;gap:8px;margin-top:10px}
.status{text-align:center;font-weight:bold;margin-top:10px}
.ok{color:#00a650}.erro{color:#ef4444}
a{color:#3483fa}
@media(max-width:600px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>🛠️ Admin Oferta Certa</h1>
<p>Cadastre produtos direto pelo celular</p>
</header>

<div class="container">
  <div class="card">
    <h2 id="formTitle">Adicionar produto</h2>

    <input type="hidden" id="id">

    <label>Nome do produto</label>
    <input id="nome" placeholder="Ex: Barbante B&B 8 Fios 1kg">

    <div class="row">
      <div>
        <label>Preço</label>
        <input id="preco" type="number" step="0.01" placeholder="49.90">
      </div>
      <div>
        <label>Categoria</label>
        <input id="categoria" placeholder="Ex: Crochê, Ferramentas">
      </div>
    </div>

    <label>URL da imagem</label>
    <input id="imagem" placeholder="Cole aqui o link da imagem">

    <label>Link do Mercado Livre</label>
    <input id="link" placeholder="Cole aqui seu link de afiliado">

    <label>Destaque</label>
    <select id="destaque">
      <option value="false">Não</option>
      <option value="true">Sim</option>
    </select>

    <button class="save" onclick="salvarProduto()">Salvar produto</button>
    <button class="clear" onclick="limparFormulario()">Limpar formulário</button>
    <div id="status" class="status"></div>
  </div>

  <div class="card">
    <h2>Produtos cadastrados</h2>
    <p><a href="index.html">← Voltar para loja</a></p>
    <div class="grid" id="lista">Carregando...</div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://qodtxydbzqmymsuvamza.supabase.co";
const SUPABASE_KEY = "sb_publishable_l9HUHlKsyhyYhY9JWuIncA_EOuDEKeD";

function msg(texto, tipo="ok"){
  const s = document.getElementById("status");
  s.className = "status " + tipo;
  s.innerText = texto;
}

async function carregarProdutos(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/produtos?select=*&order=Id.desc`, {
    headers:{ apikey: SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
  });
  const produtos = await res.json();

  document.getElementById("lista").innerHTML = produtos.map(p => `
    <div class="prod">
      <div class="img">${p.Imagem ? `<img src="${p.Imagem}">` : "🛒"}</div>
      <div class="info">
        <strong>${p.Nome || ""}</strong>
        <p>${p.Categoria || ""}</p>
        <div class="price">R$ ${Number(p.Preco || 0).toLocaleString("pt-BR",{minimumFractionDigits:2})}</div>
        <div class="actions">
          <button class="edit" onclick='editar(${JSON.stringify(p).replaceAll("'","&#39;")})'>Editar</button>
          <button class="delete" onclick="excluir(${p.Id})">Excluir</button>
        </div>
      </div>
    </div>
  `).join("") || "Nenhum produto cadastrado.";
}

function editar(p){
  document.getElementById("formTitle").innerText = "Editar produto";
  document.getElementById("id").value = p.Id;
  document.getElementById("nome").value = p.Nome || "";
  document.getElementById("preco").value = p.Preco || "";
  document.getElementById("categoria").value = p.Categoria || "";
  document.getElementById("imagem").value = p.Imagem || "";
  document.getElementById("link").value = p.Link || "";
  document.getElementById("destaque").value = String(p.Destaque || false);
  window.scrollTo({top:0,behavior:"smooth"});
}

function limparFormulario(){
  document.getElementById("formTitle").innerText = "Adicionar produto";
  document.getElementById("id").value = "";
  document.getElementById("nome").value = "";
  document.getElementById("preco").value = "";
  document.getElementById("categoria").value = "";
  document.getElementById("imagem").value = "";
  document.getElementById("link").value = "";
  document.getElementById("destaque").value = "false";
  msg("");
}

async function salvarProduto(){
  const id = document.getElementById("id").value;
  const produto = {
    Nome: document.getElementById("nome").value.trim(),
    Preco: Number(document.getElementById("preco").value || 0),
    Categoria: document.getElementById("categoria").value.trim(),
    Imagem: document.getElementById("imagem").value.trim(),
    Link: document.getElementById("link").value.trim(),
    Destaque: document.getElementById("destaque").value === "true"
  };

  if(!produto.Nome || !produto.Link){
    msg("Preencha pelo menos Nome e Link.", "erro");
    return;
  }

  const url = id
    ? `${SUPABASE_URL}/rest/v1/produtos?Id=eq.${id}`
    : `${SUPABASE_URL}/rest/v1/produtos`;

  const method = id ? "PATCH" : "POST";

  const res = await fetch(url, {
    method,
    headers:{
      apikey: SUPABASE_KEY,
      Authorization:`Bearer ${SUPABASE_KEY}`,
      "Content-Type":"application/json",
      Prefer:"return=minimal"
    },
    body: JSON.stringify(produto)
  });

  if(res.ok){
    msg(id ? "Produto atualizado com sucesso!" : "Produto cadastrado com sucesso!");
    limparFormulario();
    carregarProdutos();
  }else{
    const erro = await res.text();
    msg("Erro ao salvar: " + erro, "erro");
  }
}

async function excluir(id){
  if(!confirm("Deseja excluir este produto?")) return;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/produtos?Id=eq.${id}`, {
    method:"DELETE",
    headers:{ apikey: SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
  });
  if(res.ok){
    msg("Produto excluído.");
    carregarProdutos();
  }else{
    msg("Erro ao excluir.", "erro");
  }
}

carregarProdutos();
</script>
</body>
</html>
