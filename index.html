<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oferta Certa | Ofertas do Mercado Livre</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;color:#222}
header{background:#ffe600;padding:28px 16px;text-align:center}
.logo{font-size:42px;font-weight:900;margin:0}
.sub{font-size:18px;margin:10px 0 20px}
.search{width:92%;max-width:650px;padding:16px;border-radius:16px;border:0;font-size:17px}
.hero{background:white;margin:20px auto;padding:22px;border-radius:20px;max-width:1100px;text-align:center;box-shadow:0 4px 16px #0001}
.hero h2{font-size:26px;margin:0 0 8px}
.cats{display:flex;gap:10px;overflow-x:auto;padding:14px;max-width:1100px;margin:auto}
.cats button{border:0;background:white;color:#3483fa;padding:12px 18px;border-radius:30px;font-weight:bold;font-size:15px;white-space:nowrap;box-shadow:0 2px 8px #0001}
.cats button.active{background:#3483fa;color:white}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;padding:18px;max-width:1150px;margin:auto}
.card{background:white;border-radius:20px;overflow:hidden;box-shadow:0 4px 18px #0002;display:flex;flex-direction:column}
.img{height:235px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:64px;position:relative}
.img img{width:100%;height:100%;object-fit:cover}
.thumbs{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;background:#fafafa}
.thumb{width:45px;height:45px;border:2px solid #e5e7eb;border-radius:8px;object-fit:cover;cursor:pointer}
.thumb.active{border-color:#3483fa}
.info{padding:18px;display:flex;flex-direction:column;flex:1}
.tag{background:#eaf2ff;color:#3483fa;padding:6px 12px;border-radius:20px;font-size:13px;width:max-content}
.title{font-size:20px;margin:14px 0 10px;line-height:1.25}
.rating{color:#f59e0b;font-size:14px;margin-bottom:8px}
.old{color:#777;text-decoration:line-through;font-size:14px}
.price{font-size:30px;color:#00a650;font-weight:900;margin:5px 0 8px}
.discount{background:#00a650;color:white;border-radius:8px;padding:4px 7px;font-size:12px;font-weight:bold;display:inline-block;margin-left:6px}
.installment{font-size:14px;color:#555;margin-bottom:12px}
.freight{color:#00a650;font-weight:bold;font-size:14px;margin-bottom:14px}
.btn{margin-top:auto;display:block;background:#3483fa;color:white;text-align:center;text-decoration:none;padding:15px;border-radius:13px;font-weight:900;font-size:16px}
.badge{position:absolute;left:0;top:0;background:#ff3b30;color:white;padding:8px 10px;border-radius:0 0 12px 0;font-weight:bold;font-size:13px;z-index:2}
.cardwrap{position:relative}
.empty{text-align:center;padding:40px;font-size:18px;color:#666}
footer{background:#111827;color:white;text-align:center;padding:30px 16px;margin-top:25px}
footer p{color:#d1d5db}
.whats{position:fixed;right:18px;bottom:18px;background:#22c55e;color:white;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;text-decoration:none;box-shadow:0 6px 20px #0005}
@media(max-width:600px){.logo{font-size:36px}.sub{font-size:17px}.hero{margin:18px 14px}.grid{padding:14px}.img{height:225px}}
</style>
</head>
<body>
<header>
  <h1 class="logo">🛒 Oferta Certa</h1>
  <p class="sub">As melhores ofertas do Mercado Livre em um só lugar</p>
  <input class="search" id="search" placeholder="🔍 Pesquise produto ou categoria">
</header>
<section class="hero">
  <h2>🔥 Ofertas selecionadas para você</h2>
  <p>Produtos organizados por categoria, com compra direta pelo Mercado Livre.</p>
</section>
<nav class="cats" id="cats"></nav>
<main class="grid" id="products"><p class="empty">Carregando produtos...</p></main>
<footer><h2>Oferta Certa</h2><p>Achados, promoções e links de afiliado do Mercado Livre.</p></footer>
<a class="whats" target="_blank" href="https://wa.me/?text=Confira%20essas%20ofertas:%20https://oferta-certa.vercel.app">↗</a>
<script>
const SUPABASE_URL = "https://qodtxydbzqmymsuvamza.supabase.co";
const SUPABASE_KEY = "sb_publishable_l9HUHlKsyhyYhY9JWuIncA_EOuDEKeD";
let produtos = [];
let categoriaAtual = "Todos";
function valor(p,a,b){return p[a] ?? p[b] ?? "";}
function imagens(p){
  const raw = valor(p,"Imagem","imagem");
  if(!raw) return [];
  return String(raw).split("|").map(x=>x.trim()).filter(Boolean);
}
async function carregarProdutos(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/produtos?select=*`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});
    produtos = await res.json();
    criarCategorias(); render();
  }catch(e){document.getElementById("products").innerHTML="<p class='empty'>Erro ao carregar produtos.</p>";}
}
function criarCategorias(){
  const categorias=["Todos",...new Set(produtos.map(p=>valor(p,"Categoria","categoria")).filter(Boolean))];
  document.getElementById("cats").innerHTML=categorias.map(c=>`<button class="${c===categoriaAtual?'active':''}" onclick="filtrarCategoria('${c}')">${c}</button>`).join("");
}
function filtrarCategoria(c){categoriaAtual=c;criarCategorias();render();}
function formatarPreco(preco){const n=Number(preco||0);return n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function trocarImagem(id,url,el){
  document.getElementById("mainImg"+id).src=url;
  el.parentElement.querySelectorAll(".thumb").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}
function render(){
 const q=document.getElementById("search").value.toLowerCase();
 const lista=produtos.filter(p=>{
   const nome=String(valor(p,"Nome","nome")).toLowerCase();
   const cat=String(valor(p,"Categoria","categoria")).toLowerCase();
   return (nome.includes(q)||cat.includes(q))&&(categoriaAtual==="Todos"||valor(p,"Categoria","categoria")===categoriaAtual);
 });
 document.getElementById("products").innerHTML=lista.map(p=>{
  const id=valor(p,"Id","id");
  const nome=valor(p,"Nome","nome");
  const cat=valor(p,"Categoria","categoria")||"Oferta";
  const preco=valor(p,"Preco","preco");
  const link=valor(p,"Link","link")||"#";
  const destaque=valor(p,"Destaque","destaque");
  const imgs=imagens(p);
  const first=imgs[0]||"";
  const old=(Number(preco||0)*1.25);
  const desconto=preco?Math.round((1-Number(preco)/old)*100):0;
  return `<div class="cardwrap">
   ${destaque?"<div class='badge'>🔥 DESTAQUE</div>":""}
   <div class="card">
    <div class="img">${first?`<img id="mainImg${id}" src="${first}" alt="${nome}">`:"🛒"}</div>
    ${imgs.length>1?`<div class="thumbs">${imgs.map((im,i)=>`<img class="thumb ${i===0?'active':''}" src="${im}" onclick="trocarImagem('${id}','${im}',this)">`).join("")}</div>`:""}
    <div class="info">
      <span class="tag">${cat}</span>
      <h3 class="title">${nome}</h3>
      <div class="rating">★★★★★ 4.8</div>
      <div class="old">R$ ${old.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
      <div class="price">R$ ${formatarPreco(preco)} ${desconto?`<span class="discount">${desconto}% OFF</span>`:""}</div>
      <div class="installment">em até 12x no Mercado Pago</div>
      <div class="freight">Frete grátis em produtos selecionados</div>
      <a class="btn" href="${link}" target="_blank">Comprar no Mercado Livre</a>
    </div>
   </div></div>`;
 }).join("")||"<p class='empty'>Nenhum produto encontrado.</p>";
}
document.getElementById("search").addEventListener("input",render);
carregarProdutos();
</script>
</body>
</html>
