<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Oferta Certa | Achados e ofertas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Oferta Certa">
      <span class="brand-mark">OC</span>
      <span><strong>Oferta Certa</strong><small>Achados e ofertas</small></span>
    </a>
    <a class="btn btn-secondary btn-small" href="admin.html">Painel</a>
  </header>

  <section class="hero">
    <div class="hero-content">
      <span class="eyebrow">OFERTAS SELECIONADAS</span>
      <h1>Encontre produtos e compre direto no Mercado Livre.</h1>
      <p>Ao clicar em comprar, você será levado diretamente ao anúncio oficial.</p>
    </div>
  </section>

  <main class="store-main">
    <section class="filters">
      <input id="searchInput" type="search" placeholder="Buscar produto..." aria-label="Buscar produto">
      <select id="categoryFilter" aria-label="Filtrar por categoria">
        <option value="">Todas as categorias</option>
      </select>
    </section>

    <section class="catalog-heading">
      <div>
        <span class="eyebrow">CATÁLOGO</span>
        <h2>Produtos em destaque</h2>
      </div>
      <span id="productCount">0 produtos</span>
    </section>

    <section id="productsGrid" class="products-grid" aria-live="polite"></section>
  </main>

  <div id="galleryModal" class="gallery-modal hidden" role="dialog" aria-modal="true" aria-label="Galeria do produto">
    <button id="closeGallery" class="gallery-close" type="button" aria-label="Fechar">×</button>
    <button id="prevGallery" class="gallery-nav gallery-prev" type="button" aria-label="Foto anterior">‹</button>
    <img id="galleryImage" alt="Foto ampliada do produto">
    <button id="nextGallery" class="gallery-nav gallery-next" type="button" aria-label="Próxima foto">›</button>
    <div id="galleryCounter" class="gallery-counter"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
