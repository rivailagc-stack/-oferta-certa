<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oferta Certa - Ofertas do Mercado Livre</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;color:#222}
    header{background:#ffe600;padding:18px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px #0002}
    h1{margin:0;font-size:30px}
    .slogan{margin:5px 0 12px;color:#333}
    .search{max-width:650px;margin:auto}
    input{width:100%;padding:13px;border-radius:10px;border:1px solid #ddd;font-size:16px}
    .hero{background:linear-gradient(135deg,#fff48a,#fff);margin:18px auto;padding:22px;border-radius:16px;max-width:1100px;text-align:center}
    .hero h2{font-size:28px;margin:0 0 8px}
    .categories{max-width:1100px;margin:auto;padding:10px;display:flex;gap:10px;overflow-x:auto}
    .cat{background:white;border:1px solid #ddd;border-radius:999px;padding:10px 14px;white-space:nowrap;cursor:pointer}
    .cat:hover,.cat.active{background:#3483fa;color:white}
    .grid{max-width:1100px;margin:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
    .card{background:white;border-radius:16px;box-shadow:0 2px 10px #0001;overflow:hidden}
    .img{height:180px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:52px}
    .info{padding:15px}
    .tag{font-size:12px;background:#eaf2ff;color:#3483fa;border-radius:20px;padding:5px 9px;display:inline-block}
    .price{font-size:24px;font-weight:bold;margin:10px 0;color:#00a650}
    .old{font-size:13px;color:#888;text-decoration:line-through}
    .btn{display:block;background:#3483fa;color:white;text-align:center;text-decoration:none;padding:12px;border-radius:10px;margin-top:12px;font-weight:bold}
    footer{text-align:center;padding:25px;color:#666}
  </style>
</head>
<body>
<header>
  <h1>🟨 Oferta Certa</h1>
  <p class="slogan">As melhores ofertas da internet em um só lugar.</p>
  <div class="search"><input id="search" placeholder="🔍 Pesquise produto, categoria ou oferta..." /></div>
</header>

<section class="hero">
  <h2>🔥 Ofertas selecionadas do Mercado Livre</h2>
  <p>Produtos organizados por categoria para você comprar com segurança.</p>
</section>

<div class="categories" id="categories"></div>
<main class="grid" id="products"></main>

<footer>
  <strong>Oferta Certa</strong><br>
  Divulgação de ofertas com links do Mercado Livre.
</footer>

<script>
const categories = [
"Todos","Casa e Decoração","Cozinha","Ferramentas","Automotivo","Celulares","Informática","Games",
"Moda","Beleza","Pet Shop","Bebês","Esportes","Livros","Papelaria","Natal","Promoções","Mais Vendidos"
];

const products = [
{nome:"Jogo 16 Chaves Combinadas com Catraca Ajustável",preco:"R$ 499,00",old:"",cat:"Ferramentas",emoji:"🔧",link:"https://meli.la/1kaH9BV"},
{nome:"Jogo de Soquetes de Impacto Longos 1/2 - 10 Peças",preco:"R$ 42,98",old:"R$ 55,00",cat:"Ferramentas",emoji:"⚫",link:"https://meli.la/27JeXYb"},
{nome:"Kit 16 Peças Chaves de Catraca 72 Dentes",preco:"R$ 106,51",old:"R$ 129,90",cat:"Ferramentas",emoji:"🔩",link:"https://meli.la/2zGM9Yx"},
{nome:"Luminária LED Decorativa para Casa",preco:"R$ 39,90",old:"",cat:"Casa e Decoração",emoji:"💡",link:"#"},
{nome:"Organizador Multiuso para Cozinha",preco:"R$ 29,90",old:"",cat:"Cozinha",emoji:"🍳",link:"#"},
{nome:"Suporte Veicular para Celular",preco:"R$ 24,90",old:"",cat:"Automotivo",emoji:"🚗",link:"#"}
];

let activeCat = "Todos";

function renderCategories(){
  const el=document.getElementById("categories");
  el.innerHTML = categories.map(c=>`<button class="cat ${c===activeCat?'active':''}" onclick="setCat('${c}')">${c}</button>`).join("");
}

function renderProducts(){
  const q=document.getElementById("search").value.toLowerCase();
  const filtered=products.filter(p=>
    (activeCat==="Todos" || p.cat===activeCat) &&
    (p.nome.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q))
  );
  document.getElementById("products").innerHTML = filtered.map(p=>`
    <div class="card">
      <div class="img">${p.emoji}</div>
      <div class="info">
        <span class="tag">${p.cat}</span>
        <h3>${p.nome}</h3>
        ${p.old ? `<div class="old">${p.old}</div>` : ""}
        <div class="price">${p.preco}</div>
        <a class="btn" href="${p.link}" target="_blank">Comprar no Mercado Livre</a>
      </div>
    </div>
  `).join("");
}
function setCat(c){activeCat=c;renderCategories();renderProducts();}
document.getElementById("search").addEventListener("input",renderProducts);
renderCategories();renderProducts();
</script>
</body>
</html>
