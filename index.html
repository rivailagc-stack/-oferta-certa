<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oferta Certa</title>
<style>
body{margin:0;font-family:Arial;background:#f4f6f8;color:#222}
header{background:#ffe600;padding:25px;text-align:center}
h1{font-size:38px;margin:0}
input{width:90%;max-width:600px;padding:14px;border-radius:12px;border:0;font-size:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;padding:20px}
.card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 4px 15px #0002}
.img{height:170px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:45px}
.img img{width:100%;height:100%;object-fit:cover}
.info{padding:15px}
.tag{background:#eaf2ff;color:#3483fa;padding:5px 10px;border-radius:20px;font-size:12px}
.price{font-size:26px;color:#00a650;font-weight:bold}
.btn{display:block;background:#3483fa;color:white;text-align:center;text-decoration:none;padding:12px;border-radius:10px;font-weight:bold}
footer{background:#111;color:white;text-align:center;padding:25px}
</style>
</head>
<body>

<header>
<h1>🛒 Oferta Certa</h1>
<p>As melhores ofertas do Mercado Livre em um só lugar</p>
<input id="search" placeholder="🔍 Pesquise produto ou categoria">
</header>

<main class="grid" id="products">
<p>Carregando produtos...</p>
</main>

<footer>
<h2>Oferta Certa</h2>
<p>Produtos carregados automaticamente do Supabase.</p>
</footer>

<script>
const SUPABASE_URL = "https://qodtxydbzqmymsuvamza.supabase.co";
const SUPABASE_KEY = "sb_publishable_l9HUHlKsyhyYhY9JWuIncA_EOuDEKeD";

let produtos = [];

async function carregarProdutos(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/produtos?select=*`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  produtos = await res.json();
  render();
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();

  const lista = produtos.filter(p =>
    (p.Nome || "").toLowerCase().includes(q) ||
    (p.Categoria || "").toLowerCase().includes(q)
  );

  document.getElementById("products").innerHTML = lista.map(p => `
    <div class="card">
      <div class="img">
        ${p.Imagem ? `<img src="${p.Imagem}">` : "🛒"}
      </div>
      <div class="info">
        <span class="tag">${p.Categoria || "Oferta"}</span>
        <h3>${p.Nome}</h3>
        <p class="price">R$ ${p.Preco || "0,00"}</p>
        <a class="btn" href="${p.Link}" target="_blank">Comprar no Mercado Livre</a>
      </div>
    </div>
  `).join("") || "<p>Nenhum produto encontrado.</p>";
}

document.getElementById("search").addEventListener("input", render);
carregarProdutos();
</script>

</body>
</html>
